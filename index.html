<button class="ai-render-btn" onclick="startAiRender()">
    <span class="icon">✨</span>
    <span>AI Render Ảnh</span>
</button>

<!-- Trigger/Open The Modal --><div class="hienvideochung" id="hienvideochung"></div><!-- The Modal --><div id="myModal" class="modal1"><!-- Modal content --><div class="modal1-content"><span id="noidung1" class="close1" style="text-align: center;">TẮT-HDSD</span><p id="noidung2" style="text-align: center;">HƯỚNG DẪN SỬ DỤNG</p><div id="player"></div><div><iframe id="clipmodal" src="https://3dshow.online/hdsd/"  style="height:65vh;width:81vw;position: absolute;margin: 0 auto;display: block;" ></iframe></div></div></div><!-- link js play video --><script type="text/javascript" src="index.min.js?v=26122024205707"></script>

<script>
/**
 * Logic điều khiển AI Render
 * Author: Antigravity AI
 */
async function startAiRender() {
    const { value: file } = await Swal.fire({
        title: 'TẢI ẢNH THIẾT KẾ',
        text: 'Chọn ảnh hiện tại từ máy tính của bạn để AI xử lý',
        input: 'file',
        inputAttributes: {
            'accept': 'image/*',
            'aria-label': 'Upload image'
        },
        showCancelButton: true,
        confirmButtonText: 'Tiếp theo',
        cancelButtonText: 'Hủy',
        confirmButtonColor: '#0072ff'
    });

    if (file) {
        const { value: prompt } = await Swal.fire({
            title: 'MÔ TẢ KHÔNG GIAN',
            input: 'text',
            inputLabel: 'Mô tả chi tiết phong cách bạn muốn AI Render',
            inputValue: 'Modern interior design, photorealistic, cinematic lighting',
            showCancelButton: true,
            confirmButtonText: 'Bắt đầu Render AI',
            cancelButtonText: 'Hủy',
            confirmButtonColor: '#00c6ff'
        });

        if (prompt) {
            Swal.fire({
                title: 'ĐANG XỬ LÝ...',
                html: 'Hệ thống AI đang Render ảnh 4K.<br>Vui lòng đợi trong giây lát...',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            const formData = new FormData();
            formData.append('image', file);
            formData.append('prompt', prompt);

            try {
                // QUAN TRỌNG: Sau khi deploy lên Render.com, hãy thay localhost bằng URL thật của bạn
                // Ví dụ: https://3d-render-api.onrender.com/api/render
                const BACKEND_URL = 'https://mautest3-github-io.onrender.com'; 
                
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) throw new Error('Không thể kết nối với server Backend.');
                
                const data = await response.json();

                if (data.success) {
                    Swal.fire({
                        title: 'KẾT QUẢ RENDER AI',
                        text: 'Bạn có thể tải ảnh này về để sử dụng.',
                        imageUrl: data.renderUrl,
                        imageWidth: 800,
                        imageAlt: 'AI Rendered Result',
                        confirmButtonText: 'Tải ảnh xuống',
                        showCloseButton: true,
                        confirmButtonColor: '#0072ff',
                        width: '80%'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            window.open(data.renderUrl, '_blank');
                        }
                    });
                } else {
                    throw new Error(data.error || 'Render thất bại.');
                }
            } catch (error) {
                Swal.fire('LỖI', 'Đã xảy ra lỗi: ' + error.message, 'error');
            }
        }
    }
}
</script>
